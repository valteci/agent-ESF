services:
  api:
    build:
      context: .
      target: runtime
    command:
      - uvicorn
      - esf_agent_service.main:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./.agents:/app/.agents:ro
    restart: unless-stopped

  telegram-poller:
    build:
      context: .
      target: runtime
    command:
      - esf-agent-poller
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./AGENTS.md:/app/AGENTS.md:ro
      - ./.agents:/app/.agents:ro
    restart: unless-stopped
